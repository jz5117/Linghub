<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="400" y="38" fill="#ff9900" font-family="Arial" font-size="22" font-weight="bold" text-anchor="middle">IPA VOWEL CHART</text>
  <text x="400" y="58" fill="#666" font-family="Arial" font-size="13" text-anchor="middle">口腔体操强制训练 · 张开就不许停</text>

  <!-- Column headers -->
  <text x="175" y="82" fill="#555" font-family="Arial" font-size="12" text-anchor="middle">Front</text>
  <text x="400" y="82" fill="#555" font-family="Arial" font-size="12" text-anchor="middle">Central</text>
  <text x="615" y="82" fill="#555" font-family="Arial" font-size="12" text-anchor="middle">Back</text>

  <!-- Trapezoid outline -->
  <polygon points="165,100 615,100 650,390 130,390" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Horizontal level lines -->
  <line x1="172" y1="172" x2="622" y2="172" stroke="#1f1f1f" stroke-width="1"/>
  <line x1="181" y1="226" x2="630" y2="226" stroke="#161616" stroke-width="0.8"/>
  <line x1="195" y1="300" x2="639" y2="300" stroke="#1f1f1f" stroke-width="1"/>
  <line x1="208" y1="345" x2="643" y2="345" stroke="#161616" stroke-width="0.8"/>

  <!-- Row labels -->
  <text x="108" y="104" fill="#444" font-family="Arial" font-size="11" text-anchor="end">Close</text>
  <text x="108" y="176" fill="#444" font-family="Arial" font-size="11" text-anchor="end">Close-mid</text>
  <text x="108" y="230" fill="#444" font-family="Arial" font-size="11" text-anchor="end">Mid</text>
  <text x="108" y="304" fill="#444" font-family="Arial" font-size="11" text-anchor="end">Open-mid</text>
  <text x="108" y="349" fill="#444" font-family="Arial" font-size="11" text-anchor="end">Near-open</text>
  <text x="108" y="394" fill="#444" font-family="Arial" font-size="11" text-anchor="end">Open</text>

  <!-- CLOSE row (y=100) -->
  <!-- i -->
  <circle cx="170" cy="100" r="18" fill="#1a1a1a" stroke="#ff9900" stroke-width="2"/>
  <text x="170" y="106" fill="#ff9900" font-family="Georgia,serif" font-size="20" text-anchor="middle">i</text>
  <!-- y -->
  <circle cx="200" cy="100" r="18" fill="#1a1a1a" stroke="#ff5555" stroke-width="2"/>
  <text x="200" y="106" fill="#ff5555" font-family="Georgia,serif" font-size="20" text-anchor="middle">y</text>
  <!-- ɨ -->
  <circle cx="388" cy="100" r="18" fill="#1a1a1a" stroke="#ff9900" stroke-width="2"/>
  <text x="388" y="106" fill="#ff9900" font-family="Georgia,serif" font-size="20" text-anchor="middle">ɨ</text>
  <!-- ɯ -->
  <circle cx="597" cy="100" r="18" fill="#1a1a1a" stroke="#ff9900" stroke-width="2"/>
  <text x="597" y="106" fill="#ff9900" font-family="Georgia,serif" font-size="20" text-anchor="middle">ɯ</text>
  <!-- u -->
  <circle cx="627" cy="100" r="18" fill="#1a1a1a" stroke="#ff5555" stroke-width="2"/>
  <text x="627" y="106" fill="#ff5555" font-family="Georgia,serif" font-size="20" text-anchor="middle">u</text>

  <!-- CLOSE-MID row (y=172) -->
  <!-- e -->
  <circle cx="176" cy="172" r="18" fill="#1a1a1a" stroke="#ff9900" stroke-width="2"/>
  <text x="176" y="178" fill="#ff9900" font-family="Georgia,serif" font-size="20" text-anchor="middle">e</text>
  <!-- ø -->
  <circle cx="206" cy="172" r="18" fill="#1a1a1a" stroke="#ff5555" stroke-width="2"/>
  <text x="206" y="178" fill="#ff5555" font-family="Georgia,serif" font-size="20" text-anchor="middle">ø</text>
  <!-- o -->
  <circle cx="609" cy="172" r="18" fill="#1a1a1a" stroke="#ff5555" stroke-width="2"/>
  <text x="609" y="178" fill="#ff5555" font-family="Georgia,serif" font-size="20" text-anchor="middle">o</text>

  <!-- MID row (y=226) -->
  <!-- ə -->
  <circle cx="400" cy="226" r="18" fill="#1a1a1a" stroke="#aaa" stroke-width="2"/>
  <text x="400" y="232" fill="#aaa" font-family="Georgia,serif" font-size="20" text-anchor="middle">ə</text>

  <!-- OPEN-MID row (y=300) -->
  <!-- ɛ -->
  <circle cx="192" cy="300" r="18" fill="#1a1a1a" stroke="#ff9900" stroke-width="2"/>
  <text x="192" y="306" fill="#ff9900" font-family="Georgia,serif" font-size="20" text-anchor="middle">ɛ</text>
  <!-- œ -->
  <circle cx="222" cy="300" r="18" fill="#1a1a1a" stroke="#ff5555" stroke-width="2"/>
  <text x="222" y="306" fill="#ff5555" font-family="Georgia,serif" font-size="20" text-anchor="middle">œ</text>
  <!-- ɔ -->
  <circle cx="622" cy="300" r="18" fill="#1a1a1a" stroke="#ff5555" stroke-width="2"/>
  <text x="622" y="306" fill="#ff5555" font-family="Georgia,serif" font-size="20" text-anchor="middle">ɔ</text>

  <!-- NEAR-OPEN row (y=345) -->
  <!-- æ -->
  <circle cx="204" cy="345" r="18" fill="#1a1a1a" stroke="#ff9900" stroke-width="2"/>
  <text x="204" y="351" fill="#ff9900" font-family="Georgia,serif" font-size="20" text-anchor="middle">æ</text>
  <!-- ɐ -->
  <circle cx="406" cy="345" r="18" fill="#1a1a1a" stroke="#888" stroke-width="2"/>
  <text x="406" y="351" fill="#888" font-family="Georgia,serif" font-size="20" text-anchor="middle">ɐ</text>

  <!-- OPEN row (y=390) -->
  <!-- a -->
  <circle cx="136" cy="390" r="18" fill="#1a1a1a" stroke="#ff9900" stroke-width="2"/>
  <text x="136" y="396" fill="#ff9900" font-family="Georgia,serif" font-size="20" text-anchor="middle">a</text>
  <!-- ɑ -->
  <circle cx="625" cy="390" r="18" fill="#1a1a1a" stroke="#ff9900" stroke-width="2"/>
  <text x="625" y="396" fill="#ff9900" font-family="Georgia,serif" font-size="20" text-anchor="middle">ɑ</text>
  <!-- ɒ -->
  <circle cx="655" cy="390" r="18" fill="#1a1a1a" stroke="#ff5555" stroke-width="2"/>
  <text x="655" y="396" fill="#ff5555" font-family="Georgia,serif" font-size="20" text-anchor="middle">ɒ</text>

  <!-- Legend -->
  <circle cx="690" cy="170" r="9" fill="#1a1a1a" stroke="#ff9900" stroke-width="1.5"/>
  <text x="706" y="175" fill="#666" font-family="Arial" font-size="11">Unrounded</text>
  <circle cx="690" cy="194" r="9" fill="#1a1a1a" stroke="#ff5555" stroke-width="1.5"/>
  <text x="706" y="199" fill="#666" font-family="Arial" font-size="11">Rounded</text>

  <!-- Bottom tag -->
  <text x="400" y="432" fill="#333" font-family="Arial" font-size="11" text-anchor="middle">#IPA #口腔体操 #元音 #舌位 #音系学</text>
