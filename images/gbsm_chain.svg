<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#0a0a0a"/>

  <!-- Grid bg lines -->
  <line x1="0" y1="225" x2="800" y2="225" stroke="#111" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#111" stroke-width="1"/>

  <!-- Tree edges -->
  <line x1="370" y1="68" x2="195" y2="138" stroke="#444" stroke-width="1.8"/>
  <line x1="385" y1="68" x2="490" y2="138" stroke="#444" stroke-width="1.8"/>
  <line x1="480" y1="158" x2="420" y2="228" stroke="#444" stroke-width="1.8"/>
  <line x1="500" y1="158" x2="560" y2="228" stroke="#444" stroke-width="1.8"/>
  <line x1="560" y1="248" x2="560" y2="318" stroke="#444" stroke-width="1.8"/>
  <line x1="548" y1="338" x2="490" y2="398" stroke="#444" stroke-width="1.8"/>
  <line x1="572" y1="338" x2="640" y2="388" stroke="#4ecdc4" stroke-width="1.8" stroke-dasharray="5,3"/>

  <!-- IP -->
  <circle cx="378" cy="52" r="24" fill="#1a1a1a" stroke="#ff9900" stroke-width="2.5"/>
  <text x="378" y="57" fill="#ff9900" font-family="Arial" font-size="15" font-weight="bold" text-anchor="middle">IP</text>

  <!-- NPi (moved - highlighted) -->
  <circle cx="185" cy="150" r="26" fill="#1f1200" stroke="#ff9900" stroke-width="2.5"/>
  <text x="185" y="155" fill="#ff9900" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">NPᵢ</text>
  <text x="185" y="172" fill="#ff9900" font-family="Arial" font-size="11" text-anchor="middle">John</text>

  <!-- I' -->
  <circle cx="490" cy="148" r="22" fill="#1a1a1a" stroke="#888" stroke-width="2"/>
  <text x="490" y="153" fill="#aaa" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">I'</text>

  <!-- I (was) -->
  <circle cx="415" cy="240" r="22" fill="#1a1a1a" stroke="#888" stroke-width="2"/>
  <text x="415" y="245" fill="#aaa" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle">I</text>
  <text x="415" y="261" fill="#666" font-family="Arial" font-size="11" text-anchor="middle">was</text>

  <!-- VP -->
  <circle cx="562" cy="240" r="22" fill="#1a1a1a" stroke="#888" stroke-width="2"/>
  <text x="562" y="245" fill="#aaa" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle">VP</text>

  <!-- V' -->
  <circle cx="562" cy="330" r="22" fill="#1a1a1a" stroke="#888" stroke-width="2"/>
  <text x="562" y="335" fill="#aaa" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle">V'</text>

  <!-- V (arrested) -->
  <circle cx="488" cy="405" r="22" fill="#1a1a1a" stroke="#888" stroke-width="2"/>
  <text x="488" y="409" fill="#aaa" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">V</text>
  <text x="488" y="425" fill="#555" font-family="Arial" font-size="10" text-anchor="middle">arrested</text>

  <!-- NP trace (teal dashed) -->
  <circle cx="643" cy="403" r="24" fill="#001a1a" stroke="#4ecdc4" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="643" y="408" fill="#4ecdc4" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle">NPᵢ</text>
  <text x="643" y="424" fill="#4ecdc4" font-family="Arial" font-size="12" text-anchor="middle">tᵢ</text>

  <!-- Movement arrow (curved, orange) -->
  <defs>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff9900"/>
    </marker>
  </defs>
  <path d="M 622,382 Q 380,290 210,174" fill="none" stroke="#ff9900" stroke-width="2.2"
        stroke-dasharray="7,4" marker-end="url(#arrowOrange)"/>

  <!-- Chain label -->
  <text x="400" y="315" fill="#ff9900" font-family="Arial" font-size="13" font-style="italic" text-anchor="middle">⟨NPᵢ, tᵢ⟩ Chain</text>

  <!-- GBSM badge -->
  <rect x="600" y="15" width="170" height="42" rx="4" fill="#ff9900"/>
  <text x="685" y="41" fill="#000" font-family="Arial" font-size="26" font-weight="bold" text-anchor="middle">GBSM</text>

  <!-- Subtitle -->
  <text x="685" y="72" fill="#666" font-family="Arial" font-size="12" text-anchor="middle">Government &amp; Binding</text>
  <text x="685" y="88" fill="#444" font-family="Arial" font-size="11" text-anchor="middle">Chomsky 1981</text>

  <!-- ECP tag bottom left -->
  <text x="20" y="435" fill="#333" font-family="Arial" font-size="11">#ECP #Move-α #A-binding</text>
</svg>
